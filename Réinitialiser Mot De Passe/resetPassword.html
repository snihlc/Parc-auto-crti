<!DOCTYPE html>
<html lang="fr">
    <head>
         <meta charset="UTF-8">
         <meta name="viewport" content="width=device-width,initial-scale=1">
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{
  margin:0;
  padding:0;
  font-family:'Segoe UI',Arial,sans-serif;
  font-family:'Segoe UI',Arial,sans-serif;
  background:linear-gradient(135deg, #81879d, #cfd0dd, #e7e8ec);
  display:flex;
}


.login-card {
    border-radius:25px;
    padding: 5px;
    background: rgba(255,255,255,0.6) !important;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    max-width:500px;
    width:100%;
    height:auto;
    backdrop-filter:blur(20px);
}

.login-card:hover{
    box-shadow: 0 25px 50px rgba(66, 61, 61, 0.4);

}

.login-card input{
    border:none;
    padding:15px 20px;
    background:rgba(255,255,255,0.8);
    border-radius:50px;
    transition:0.3s;
}


.login-card input:focus{
    outline:none;
    background:white;
}

.login-card button{
    color:#ffffff;
    background:linear-gradient(135deg, #122352, #2c3368, #516a9e);
    border-radius:50px;
    padding:12px;
    font-weight:bold;
    border:none;
    transition:0.3s;
}

.login-card button:hover{
    transform:scale(1.03);
}


.login-card a{
    color:#122352;
    font-weight:500;
}
.login-card a:hover{
    text-decoration:underline;
 }
   
.login-card .card-title{
    color:#122352;
    text-align: center;
    margin-bottom: 30px;
    font-weight: bold;
}

@media(max-width:576px){
    .login-card{
        width:90%;
        margin:0 auto;
        max-width: 350px;
    }
    .logo{
        width:200px
    }
}

.left-side h1{
    font-weight:400;
    letter-spacing:1px;
    color:#eeeffa;
}

.left-side h3{
    color:#eeeffa;
    font-weight:300;
}

.left-side{
    margin-top:-40px;
}

@media(prefers-color-scheme:dark ){
    body{
        background: linear-gradient(135deg,#000215,#071036,#29375d);
    }
    .login-card{
        background: rgba(30,35,60,0.85);
        border:2px solid #3f4fa3;
    }
    .login-card button{
         background:linear-gradient(135deg,#000217,#091237,#243258);
        color:white;
    }
    .login-card .mt-3{
        color:#000217;
    }
    .login-card .card-title{
        color:#000217;
    }
}
</style>
                <title>Login</title>
    </head>

 <body>
        <div class="container-fluid vh-100 d-flex flex-column flex-md-row align-items-center justify-content-center">

            <div class="card login-card p-4 w-100 w-md-45">
                <h5 class="text-center card-title text-start mb-4">Réinitialiser le mot de passe</h5>
                <form onsubmit="confirmerMDP(event)">
<div class="form-floating mb-4">

  <input type="password" class="form-control" id="Password" placeholder="Password">
  <label for="Password">Nouveau mot de passe</label>
</div>
<div class="form-floating mb-4">
  <input type="password" class="form-control" id="confirmPassword" placeholder="ConfirmPassword">
  <label for="confirmPassword">Confirmer mot de passe</label>
            <div class="text-danger" id="erreurMDP"></div>

</div>

                    <button type="submit" class="btn w-100 btn-lg mb-2">Réinitialiser</button>

                </form>
            </div>
        </div>
        <script>
function confirmerMDP(event){
    event.preventDefault();
    let motDePasse = document.getElementById("Password").value.trim();
    let confirmMotDePasse = document.getElementById("confirmPassword").value.trim();

    let erreur = false;

    document.getElementById("erreurMDP").innerHTML="";

    if (motDePasse === "" || confirmMotDePasse === ""){
    document.getElementById("erreurMDP").innerHTML="Veuillez saisir le nouveau mot de passe!";
erreur = true;
    }

    if (motDePasse !== confirmMotDePasse){
        document.getElementById("erreurMDP").innerHTML="Les mots de passes ne correspondent pas!";
        erreur = true;
    }

    if (erreur) return ;
    event.target.submit();
}
        </script>
    </body>
 </html>
