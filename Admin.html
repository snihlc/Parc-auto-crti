<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
        <Title>Admin</Title>
        <style>
            body{
                overflow-x:hidden;
                background-color:#e7e8ec;
            }
            .navbar{
                height:70px;
            }
            .card{
                border:none;
                border-radius:15px;
            }
            #sidebar{
                min-height:100vh;
                width:250px;
                background:linear-gradient(135deg, #122352, #2c3368, #516a9e);
                color:white;
                transition:0.3s;
            }
            .sidebar-link{
                display:block;
                background-color:white;
                padding: 12px 20px;
                color:#122352;
                border-radius:10px;
                text-decoration: none;
                font-weight:500;
                transition:0.2s;
            } 
            .sidebar-link:hover {
                background-color: rgb(226, 211, 211);
                transform:translateX(5px);
            }
            #logout-btn{
                position:absolute;
                bottom: 20px;
            }
            .card:hover{
                transition:0.3s;
                transform:translateY(-5px);
            }
            @media (max-width: 768px) {
                #sidebar {
                    position: fixed;
                    left: -250px;
                    top: 0;
                    z-index: 999;
                }

                #sidebar.active {
                    left: 0;
                }

                #sidebar-overlay {
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background-color: rgba(0,0,0,0.5);
                    display: none;
                    z-index: 998;
                }
                #sidebar-overlay.active {
                    display: block;
                }
            }    
        </style>
    </head>
        <body>
            <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
            <div class="container-fluid">
                <div class="row">
                    <div class="col-md-3 col-lg-2 md-block p-0" id="sidebar">
                        <div class="p-4">
                            <h4 class="text-center mt-4"><i class="bi bi-person-gear"></i> Admin</h4>
                            <hr>
                            <a class="sidebar-link mb-2 text-center mt-5" onclick="showdashboard()"><i class="bi bi-speedometer2"></i> Dashboard</a>
                            <a class="sidebar-link mb-2 text-center mt-4" onclick="loadPage('users')"><i class="bi bi-people"></i> Utilisateurs</a>
                            <a class="sidebar-link mb-2 text-center mt-4" onclick="loadPage('rapports')"><i class="bi bi-bar-chart"></i> Rapports</a>
                            <button id="logout-btn" class="btn btn-danger" onclick="logout()">Deconnecter</button>
                        </div>
                    </div>
                    <div class="col-md-9 col-lg-10 p-0">
                        <nav class="navbar navbar-light bg-light shadow-sm px-3 " id="top-navbar">
                            <button class="btn btn-dark d-md-none mb-2" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
                            <span class="navbar-brand mx-auto mx-md-0">
                                <img src="../Images/CRTI-logo-removebg-preview.png" class="logo " width="50">
                            </span>
                            <div class="ms-auto d-flex align-items-end gap-4">
                                <i class="bi bi-envelope fs-5"></i>
                                <i class="bi bi-bell fs-5"></i>
                            </div>
                        </nav>
                            <div class="p-4" id="content">
                                <h2 class="mb-4 text-center mt-5">Dashboard Administrateur</h2>
                                <p class="text-muted text-center mt-3">Bienvenue dans l'espace Administrateur,Gérer les comptes,les roles et consulter les statistiques du Système</p>
                                <div class="row align-items justify-content-center">
                                    <div class="col-md-3 mb-3 mt-4 ">
                                        <div class="card shadow text-center">
                                            <div class="card-body "><i class="bi bi-people fs-1 text-primary"></i>
                                                <h4>25</h4>
                                                <p class="text-muted">Utilisateurs</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div class=" col-md-3 mb-3 mt-4">
                                        <div class="card shadow text-center">
                                            <div class="card-body "><i class="bi bi-person-check fs-1 text-primary"></i>
                                                <h4>18</h4>
                                                <p class="text-muted">Actifs</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div class=" col-md-3 mb-3 mt-4">
                                        <div class="card shadow text-center">
                                            <div class="card-body"><i class="bi bi-person-x fs-1 text-primary"></i>
                                                <h4>7</h4>
                                                <p class="text-muted">Inactifs</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="  col-md-3 mb-3 mt-4">
                                        <div class="card shadow text-center">
                                            <div class="card-body"><i class="bi bi-key fs-1 text-primary"></i>
                                                <h4>5</h4>
                                                <p class="text-muted">Role</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                    </div>
                </div>
            </div>
